name: PR CI

on:
  pull_request:
    paths:
      - ".aspell.en.pws"
      - "leadership-cv.tex"
      - "advisory-cv.tex"
      - "cv.sty"
      - "Makefile"
      - ".github/workflows/publish.yml"
      - ".github/workflows/pr.yml"
  push:
    paths:
      - ".aspell.en.pws"
      - "leadership-cv.tex"
      - "advisory-cv.tex"
      - "cv.sty"
      - "Makefile"
      - ".github/workflows/publish.yml"
      - ".github/workflows/pr.yml"
    branches:
      - "*"
      - "!master"

jobs:
  detect-cvs:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
      matrix: ${{ steps.detect.outputs.matrix }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed CVs
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$PR_BASE_SHA"
            head="$PR_HEAD_SHA"
          else
            base="$PUSH_BEFORE_SHA"
            head="$PUSH_HEAD_SHA"
          fi

          if [ -z "$base" ] || printf '%s' "$base" | grep -q '^0\+$'; then
            files=$(git diff-tree --no-commit-id --name-only -r "$head")
          else
            files=$(git diff --name-only "$base" "$head")
          fi

          echo "Changed files:"
          echo "$files"

          shared=false
          if echo "$files" | grep -Eq '^(\.aspell\.en\.pws|cv\.sty|Makefile|\.github/workflows/(publish|pr)\.yml)$'; then
            shared=true
          fi

          include=()
          if [ "$shared" = true ] || echo "$files" | grep -qx 'leadership-cv.tex'; then
            include+=('{"cv":"leadership-cv","label":"leadership CV"}')
          fi
          if [ "$shared" = true ] || echo "$files" | grep -qx 'advisory-cv.tex'; then
            include+=('{"cv":"advisory-cv","label":"advisory CV"}')
          fi

          if [ "${#include[@]}" -eq 0 ]; then
            echo 'changed=false' >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
          else
            matrix=$(printf '%s\n' "${include[@]}" | paste -sd, -)
            echo 'changed=true' >> "$GITHUB_OUTPUT"
            echo "matrix={\"include\":[$matrix]}" >> "$GITHUB_OUTPUT"
          fi

  build-check:
    needs: detect-cvs
    if: needs.detect-cvs.outputs.changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect-cvs.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependences
        run: |
          make deps

      - name: Spellcheck ${{ matrix.label }}
        run: |
          make spellcheck CVS=${{ matrix.cv }}

      - name: Build ${{ matrix.label }}
        run: |
          make create-pdf CVS=${{ matrix.cv }}

      - name: Check ${{ matrix.label }} length
        run: |
          make check-length CVS=${{ matrix.cv }}
